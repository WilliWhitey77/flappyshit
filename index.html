<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Pitbull Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Arka plan resmi */
        #background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #bird {
            position: absolute;
            width: 50px;
            height: 40px;
            left: 50px;
            top: 250px;
            z-index: 10;
            transition: transform 0.1s;
        }

        #bird img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* BORULAR - CSS ile çizilmiş */
        .pipe {
            position: absolute;
            width: 60px;
            z-index: 5;
        }

        .pipe-top {
            top: 0;
            background: linear-gradient(to right, #228B22 0%, #32CD32 50%, #228B22 100%);
            border-left: 3px solid #006400;
            border-right: 3px solid #006400;
            border-bottom: 4px solid #006400;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        /* Boru başlığı (üst) */
        .pipe-top::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: -5px;
            width: 70px;
            height: 20px;
            background: linear-gradient(to right, #228B22 0%, #32CD32 50%, #228B22 100%);
            border: 3px solid #006400;
            border-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .pipe-bottom {
            bottom: 50px;
            background: linear-gradient(to right, #228B22 0%, #32CD32 50%, #228B22 100%);
            border-left: 3px solid #006400;
            border-right: 3px solid #006400;
            border-top: 4px solid #006400;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        /* Boru başlığı (alt) */
        .pipe-bottom::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -5px;
            width: 70px;
            height: 20px;
            background: linear-gradient(to right, #228B22 0%, #32CD32 50%, #228B22 100%);
            border: 3px solid #006400;
            border-radius: 2px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.3);
        }

        /* Boru detayları - vurgu çizgileri */
        .pipe::before {
            content: '';
            position: absolute;
            left: 10px;
            width: 3px;
            height: 100%;
            background: rgba(255,255,255,0.2);
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 20;
            font-family: 'Arial Black', sans-serif;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            color: white;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #FFD700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: #333;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(255,215,0,0.5);
        }

        /* YER - CSS ile çizilmiş */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, #DEB887 0%, #D2B48C 50%, #8B4513 100%);
            z-index: 15;
            border-top: 4px solid #5D4037;
            overflow: hidden;
        }

        /* Yer çim detayı */
        #ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: repeating-linear-gradient(
                90deg,
                #7CB342 0px,
                #7CB342 8px,
                #689F38 8px,
                #689F38 16px
            );
        }

        /* Yer deseni */
        #ground::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 20px,
                    rgba(0,0,0,0.05) 20px,
                    rgba(0,0,0,0.05) 22px
                );
        }

        /* Bulutlar */
        .cloud {
            position: absolute;
            z-index: 2;
            opacity: 0.9;
        }

        .cloud img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Ses kontrol butonu */
        #muteButton {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #333;
            border-radius: 50%;
            cursor: pointer;
            z-index: 25;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: transform 0.2s, background 0.2s;
        }

        #muteButton:hover {
            transform: scale(1.1);
            background: #FFD700;
        }

        /* Ses seviyesi kontrolü */
        #volumeControl {
            position: absolute;
            top: 70px;
            right: 10px;
            width: 60px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #333;
            border-radius: 10px;
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        #volumeControl.show {
            display: flex;
        }

        #volumeSlider {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            width: 8px;
            height: 80px;
            padding: 0 5px;
        }

        #volumeControl input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            outline: none;
        }

        #volumeControl input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #FFD700;
            border: 2px solid #333;
            border-radius: 50%;
            cursor: pointer;
        }

        #volumeControl input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #FFD700;
            border: 2px solid #333;
            border-radius: 50%;
            cursor: pointer;
        }

        #volumeLabel {
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        /* SİNEKLER - Sinir bozucu sinekler */
        .fly {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 35;
            pointer-events: none;
            animation: flyBuzz 0.1s infinite;
        }

        .fly::before {
            content: '🪰';
            font-size: 18px;
            position: absolute;
            animation: flyWiggle 0.05s infinite;
        }

        @keyframes flyBuzz {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes flyWiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        /* Sinek gölgesi */
        .fly-shadow {
            position: absolute;
            width: 8px;
            height: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            z-index: 34;
            pointer-events: none;
        }

        /* Sinir bozucu metin efekti */
        .annoying-text {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
            20%, 40%, 60%, 80% { transform: translateX(2px); }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="gameContainer">
        <!-- Arka plan -->
        <img id="background" src="photos/background.png" alt="background">

        <!-- Bulutlar -->
        <div class="cloud" style="width: 100px; height: 60px; top: 50px; left: 50px;">
            <img src="photos/cloud.png" alt="cloud">
        </div>
        <div class="cloud" style="width: 120px; height: 70px; top: 100px; left: 250px;">
            <img src="photos/cloud.png" alt="cloud">
        </div>
        <div class="cloud" style="width: 80px; height: 50px; top: 30px; left: 300px;">
            <img src="photos/cloud.png" alt="cloud">
        </div>

        <div id="score">0</div>
        <!-- Ses kontrol butonu -->
        <div id="muteButton">🔊</div>
        <div id="volumeControl">
            <span id="volumeLabel">Ses</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="70">
        </div>

        <!-- Kuş -->
        <div id="bird">
            <img src="photos/bird.png" alt="bird">
        </div>

        <!-- Yer (CSS ile çizilmiş) -->
        <div id="ground"></div>

        <div id="startScreen">
            <h1>🐦 FLAPPY BIRD</h1>
            <p style="margin-bottom: 20px; font-size: 18px;">Ekrana tıkla veya SPACE bas</p>
            <button onclick="startGame()">BAŞLA</button>
        </div>

        <div id="gameOverScreen">
            <h1 class="annoying-text">💀 EZİK</h1>
            <p style="font-size: 24px; margin-bottom: 10px;">Skor: <span id="finalScore">0</span></p>
            <p style="font-size: 14px; margin-bottom: 20px; color: #FFD700;">🔥 YETENEK EDİNDE GEL...</p>
            <button onclick="resetGame()">TEKRAR OYNA</button>
        </div>
    </div>

    <script>
        const bird = document.getElementById('bird');
        const birdImg = bird.querySelector('img');
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');

        let birdY = 250;
        let birdVelocity = 0;
        let gravity = 0.25;
        let jumpStrength = -6;
        let score = 0;
        let gameRunning = false;
        let pipes = [];
        let pipeInterval;
        let gameLoop;
        let backgroundMusic = null;
        let flapSound = null;
        let gameOverMusic = null;
        let pipePassSound = null;
        let isMuted = false;
        let globalVolume = 0.7;

        // Sinek değişkenleri
        let flies = [];
        let flyInterval;
        let flySoundInterval;

        // Ses kontrol butonu elementleri
        const muteButton = document.getElementById('muteButton');
        const volumeControl = document.getElementById('volumeControl');
        const volumeSlider = document.getElementById('volumeSlider');

        // Ses seviyesini güncelle
        function updateVolume() {
            globalVolume = volumeSlider.value / 100;

            if (backgroundMusic) {
                backgroundMusic.volume = isMuted ? 0 : globalVolume * 0.5;
            }
            if (gameOverMusic) {
                gameOverMusic.volume = isMuted ? 0 : globalVolume * 0.7;
            }
            if (flapSound) {
                flapSound.volume = isMuted ? 0 : globalVolume * 0.5;
            }
            if (pipePassSound) {
                pipePassSound.volume = isMuted ? 0 : globalVolume * 0.6;
            }
        }

        // Sesi aç/kapat
        function toggleMute() {
            isMuted = !isMuted;
            muteButton.textContent = isMuted ? '🔇' : '🔊';

            updateVolume();
        }

        // Ses kontrol butonu olayları
        muteButton.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMute();
        });

        muteButton.addEventListener('mouseenter', () => {
            volumeControl.classList.add('show');
        });

        volumeControl.addEventListener('mouseleave', () => {
            volumeControl.classList.remove('show');
        });

        volumeControl.addEventListener('mouseenter', () => {
            volumeControl.classList.add('show');
        });

        volumeSlider.addEventListener('input', (e) => {
            e.stopPropagation();
            updateVolume();
        });

        volumeSlider.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Dokunmatik cihazlar için
        muteButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            toggleMute();
        });

        // Arka plan müziği - backgroundmusic klasöründen
        function playBackgroundMusic() {
            if (backgroundMusic) {
                backgroundMusic.pause();
                backgroundMusic.currentTime = 0;
            }

            backgroundMusic = new Audio('backgroundmusic/background.mp3');
            backgroundMusic.volume = isMuted ? 0 : globalVolume * 0.5;
            backgroundMusic.loop = true;

            const playPromise = backgroundMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Arka plan müziği çalma hatası:", error);
                });
            }
        }

        // Arka plan müziğini durdur
        function stopBackgroundMusic() {
            if (backgroundMusic) {
                backgroundMusic.pause();
                backgroundMusic.currentTime = 0;
            }
        }

        // Game Over müziği çal - music klasöründeki pitbull-fireball.mp3
        function playGameOverMusic() {
            stopBackgroundMusic();

            if (gameOverMusic) {
                gameOverMusic.pause();
                gameOverMusic.currentTime = 0;
            }

            gameOverMusic = new Audio('music/pitbull-fireball.mp3');
            gameOverMusic.volume = isMuted ? 0 : globalVolume * 0.7;
            gameOverMusic.loop = true;
            gameOverMusic.play().catch(error => {
                console.log("Game over müziği çalma hatası:", error);
            });
        }

        // Borudan geçme sesi çal - music klasöründen borugecmesesi.mp3
        function playPipePassSound() {
            if (pipePassSound) {
                pipePassSound.pause();
                pipePassSound.currentTime = 0;
            }

            pipePassSound = new Audio('music/borugecmesesi.mp3');
            pipePassSound.volume = isMuted ? 0 : globalVolume * 0.6;

            const playPromise = pipePassSound.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Boru geçme sesi çalma hatası:", error);
                });
            }
        }

        // Tıklama (flap) sesi - MP3 dosyasından
        function playFlapSound() {
            if (flapSound) {
                flapSound.pause();
                flapSound.currentTime = 0;
            }

            flapSound = new Audio('music/osuruk-sesi.mp3');
            flapSound.volume = isMuted ? 0 : globalVolume * 0.5;

            const playPromise = flapSound.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Flap sesi çalma hatası:", error);
                });
            }
        }

        // Sinir bozucu sinek sesi
        function playFlyBuzzSound() {
            if (isMuted) return;

            const buzz = new Audio();
            // Base64 encoded short buzz sound (data URI)
            buzz.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmFgU7k9n1unEiBC13yO/eizEIHWq+8+OWT';
            buzz.volume = globalVolume * 0.3;
            buzz.play().catch(() => {});
        }

        // Sinek oluştur
        function createFly() {
            const fly = document.createElement('div');
            fly.className = 'fly';

            // Rastgele başlangıç pozisyonu
            const startX = Math.random() * 350;
            const startY = Math.random() * 550;

            fly.style.left = startX + 'px';
            fly.style.top = startY + 'px';

            gameContainer.appendChild(fly);

            // Sinek hareket verileri
            const flyData = {
                element: fly,
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 8, // Hızlı ve sinir bozucu
                vy: (Math.random() - 0.5) * 8,
                targetX: Math.random() * 350,
                targetY: Math.random() * 550,
                changeDirectionTimer: 0
            };

            flies.push(flyData);
        }

        // Sinekleri güncelle
        function updateFlies() {
            flies.forEach(fly => {
                // Rastgele yön değiştirme (sinir bozucu hareket)
                fly.changeDirectionTimer++;
                if (fly.changeDirectionTimer > 10 + Math.random() * 20) {
                    fly.targetX = Math.random() * 380;
                    fly.targetY = Math.random() * 580;
                    fly.changeDirectionTimer = 0;
                }

                // Hedefe doğru hareket
                const dx = fly.targetX - fly.x;
                const dy = fly.targetY - fly.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    fly.vx += (dx / dist) * 0.5;
                    fly.vy += (dy / dist) * 0.5;
                }

                // Hız sınırlama
                const maxSpeed = 6;
                const speed = Math.sqrt(fly.vx * fly.vx + fly.vy * fly.vy);
                if (speed > maxSpeed) {
                    fly.vx = (fly.vx / speed) * maxSpeed;
                    fly.vy = (fly.vy / speed) * maxSpeed;
                }

                // Pozisyon güncelle
                fly.x += fly.vx;
                fly.y += fly.vy;

                // Sınırlar içinde tut
                if (fly.x < 0) { fly.x = 0; fly.vx *= -1; }
                if (fly.x > 380) { fly.x = 380; fly.vx *= -1; }
                if (fly.y < 0) { fly.y = 0; fly.vy *= -1; }
                if (fly.y > 580) { fly.y = 580; fly.vy *= -1; }

                // Görsel güncelle
                fly.element.style.left = fly.x + 'px';
                fly.element.style.top = fly.y + 'px';

                // Yön değişiminde dönüş
                const angle = Math.atan2(fly.vy, fly.vx) * 180 / Math.PI;
                fly.element.style.transform = `rotate(${angle}deg) scale(${0.8 + Math.random() * 0.4})`;
            });
        }

        // Sinekleri temizle
        function clearFlies() {
            flies.forEach(fly => {
                fly.element.remove();
            });
            flies = [];
            if (flyInterval) clearInterval(flyInterval);
            if (flySoundInterval) clearInterval(flySoundInterval);
        }

        // Sinekleri başlat
        function startFlies() {
            clearFlies();

            // İlk sinekleri oluştur
            for (let i = 0; i < 8; i++) {
                setTimeout(() => createFly(), i * 200);
            }

            // Sinek hareketini güncelle
            flyInterval = setInterval(updateFlies, 30);

            // Sinir bozucu sesler
            flySoundInterval = setInterval(() => {
                if (Math.random() > 0.3) {
                    playFlyBuzzSound();
                }
            }, 500);

            // Yeni sinekler ekle
            setTimeout(() => {
                const addFlyInterval = setInterval(() => {
                    if (flies.length < 15 && gameOverScreen.style.display !== 'none') {
                        createFly();
                    } else if (gameOverScreen.style.display === 'none') {
                        clearInterval(addFlyInterval);
                    }
                }, 1000);
            }, 2000);
        }

        function jump() {
            if (!gameRunning) return;
            birdVelocity = jumpStrength;
            playFlapSound();
        }

        function createPipe() {
            const pipeGap = 160;
            const minHeight = 60;
            const maxHeight = 350;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            const bottomHeight = 550 - topHeight - pipeGap;

            const pipeTop = document.createElement('div');
            pipeTop.className = 'pipe pipe-top';
            pipeTop.style.height = topHeight + 'px';
            pipeTop.style.left = '400px';

            const pipeBottom = document.createElement('div');
            pipeBottom.className = 'pipe pipe-bottom';
            pipeBottom.style.height = bottomHeight + 'px';
            pipeBottom.style.left = '400px';

            gameContainer.appendChild(pipeTop);
            gameContainer.appendChild(pipeBottom);

            pipes.push({
                top: pipeTop,
                bottom: pipeBottom,
                x: 400,
                passed: false
            });
        }

        function updateGame() {
            if (!gameRunning) return;

            birdVelocity += gravity;
            birdY += birdVelocity;

            const rotation = Math.min(Math.max(birdVelocity * 3, -30), 90);
            bird.style.transform = `rotate(${rotation}deg)`;
            bird.style.top = birdY + 'px';

            if (birdY > 510 || birdY < 0) {
                gameOver();
                return;
            }

            pipes.forEach((pipe, index) => {
                pipe.x -= 2.5;
                pipe.top.style.left = pipe.x + 'px';
                pipe.bottom.style.left = pipe.x + 'px';

                const birdRect = bird.getBoundingClientRect();
                const containerRect = gameContainer.getBoundingClientRect();

                const birdLeft = birdRect.left - containerRect.left;
                const birdRight = birdRect.right - containerRect.left;
                const birdTop = birdRect.top - containerRect.top;
                const birdBottom = birdRect.bottom - containerRect.top;

                const topLeft = pipe.x;
                const topRight = pipe.x + 60;
                const topBottom = parseInt(pipe.top.style.height);

                const bottomTop = 550 - parseInt(pipe.bottom.style.height);
                const bottomLeft = pipe.x;
                const bottomRight = pipe.x + 60;

                if (birdRight > topLeft && birdLeft < topRight) {
                    if (birdTop < topBottom || birdBottom > bottomTop) {
                        gameOver();
                        return;
                    }
                }

                if (!pipe.passed && pipe.x < 50) {
                    score++;
                    scoreElement.textContent = score;
                    playPipePassSound();
                    pipe.passed = true;
                }

                if (pipe.x < -70) {
                    pipe.top.remove();
                    pipe.bottom.remove();
                    pipes.splice(index, 1);
                }
            });
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(pipeInterval);
            clearInterval(gameLoop);
            playGameOverMusic();
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'flex';

            // Sinekleri başlat!
            startFlies();
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            playBackgroundMusic();
            gameLoop = setInterval(updateGame, 1000 / 60);
            pipeInterval = setInterval(createPipe, 2000);
            createPipe();
        }

        function resetGame() {
            stopBackgroundMusic();
            clearFlies();

            if (gameOverMusic) {
                gameOverMusic.pause();
                gameOverMusic.currentTime = 0;
            }

            if (flapSound) {
                flapSound.pause();
                flapSound.currentTime = 0;
            }

            if (pipePassSound) {
                pipePassSound.pause();
                pipePassSound.currentTime = 0;
            }

            pipes.forEach(pipe => {
                pipe.top.remove();
                pipe.bottom.remove();
            });
            pipes = [];

            birdY = 250;
            birdVelocity = 0;
            score = 0;
            scoreElement.textContent = '0';
            bird.style.top = '250px';
            bird.style.transform = 'rotate(0deg)';

            gameOverScreen.style.display = 'none';
            startGame();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'KeyW') {
                e.preventDefault();
                jump();
            }
        });

        gameContainer.addEventListener('click', jump);
        gameContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
